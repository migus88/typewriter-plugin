macro.pause.description=Pause typing for N milliseconds.
macro.reformat.description=Run the IDE’s Reformat Code action at the caret.
macro.br.description=Drop the next character if it’s a line break — keep the script multi-line while the output stays single-line.
macro.complete.description=Imitate completion: type N chars, show the popup, then drop the rest of Word.
macro.complete.delay.description=Same as complete, but holds the popup for DELAY ms (overrides the global completion delay).
macro.import.auto.description=Show the Alt+Enter popup for N ms, then accept the first import option.
macro.import.ns.description=Insert a language-appropriate import for Namespace after a delay of N ms.
macro.import.option.description=Show the Alt+Enter popup for N ms, then accept the K-th option.
macro.caret.description=Move the caret <b>up</b>, <b>down</b>, <b>left</b>, or <b>right</b> by N steps.
macro.backspace.description=Press Backspace N times — one click + jittered pause per press.
macro.backspace.hold.description=Hold Backspace: delete N chars at typing pace with a single click sound.
macro.goto.description=Walk the caret to right after the first occurrence of String.
macro.goto.anchor.description=Walk the caret to Target, located after Anchor (anchor disambiguates).
macro.snip.description=Type the live-template abbreviation NAME, then press Tab to expand it.
macro.snip.delay.description=Same as snip, but waits DELAY ms before pressing Tab.
macro.key.tab.description=Press Tab once at the caret — routed through the editor’s smart-tab handler.
macro.key.enter.description=Press Enter once at the caret — routed through the editor’s smart-enter handler.
macro.key.alt.enter.description=Press Alt+Enter to open the IDE’s intentions popup. Drive it with <b>{{key:up/down}}</b> + <b>{{key:enter}}</b>.
macro.key.up.description=Press the Up arrow once. Targets whatever has focus — typically a popup that just opened.
macro.key.down.description=Press the Down arrow once. Targets whatever has focus — typically a popup that just opened.
macro.key.left.description=Press the Left arrow once. Targets whatever has focus — typically a popup that just opened.
macro.key.right.description=Press the Right arrow once. Targets whatever has focus — typically a popup that just opened.
macro.key.esc.description=Press Esc once. Targets whatever has focus — typically dismisses a popup.
